status = "untested"
probe_id = "lang-swift"
threshold = "parse sample .swift file AND extract >= 1 func/class"
priority = "low"

[languages.typescript]
type = "language"
status = "untested"
probe_id = "lang-typescript"
threshold = "parse sample .ts file AND extract >= 1 function/interface"
priority = "high"

# ============================================================================
# AGENT RUNTIME PHASES (5)
# ============================================================================

[runtime.plan_phase]
type = "runtime-phase"
status = "untested"
probe_id = "runtime-plan"
threshold = "agent enters Plan phase AND produces task decomposition"
priority = "high"

[runtime.act_phase]
type = "runtime-phase"
status = "untested"
probe_id = "runtime-act"
threshold = "agent enters Act phase AND executes at least 1 tool call"
priority = "high"

[runtime.observe_phase]
type = "runtime-phase"
status = "untested"
probe_id = "runtime-observe"
threshold = "agent enters Observe phase AND processes tool results"
priority = "high"

[runtime.reflect_phase]
type = "runtime-phase"
status = "untested"
probe_id = "runtime-reflect"
threshold = "agent enters Reflect phase AND produces self-assessment"
priority = "high"

[runtime.budget_enforcer]
type = "runtime-phase"
status = "untested"
probe_id = "runtime-budget"
threshold = "agent stops when token budget exceeded (no infinite loop)"
priority = "high"
note = "Critical safety mechanism"
