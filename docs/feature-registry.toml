# Feature Registry — Per-Component Validation
#
# Maps EVERY feature of Theo Code to a probe + pass/fail threshold.
# The refinement cycle uses this to identify the weakest component
# and improve it. Individual improvements cascade to global thresholds.
#
# Status: untested | pass | fail | flaky | skip
# Type: tool | cli-subcommand | provider | language | runtime-phase | wiki
#
# Meeting: 20260429-143744
# Created: 2026-04-29

