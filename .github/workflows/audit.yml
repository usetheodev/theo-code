# T6.1 / T4.6 / T1.5 CI wiring — runs every audit gate on every PR.
#
# Invariant: if any gate fails, the PR is blocked. Gates that depend on
# external binaries (semgrep, gitleaks, osv-scanner) install them at the
# start of the job so the pipeline is self-contained.

name: audit

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Fast structural gates (no heavy build) ──────────────────────────────
  structural:
    name: Structural gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required by `check-adr-coverage.sh` (git log
          # --grep over D1..D16-tied task IDs). Other structural gates
          # are content-only and tolerate the deeper fetch.
          fetch-depth: 0
      - name: arch-contract regex regression (T0.1 / find_p5_001)
        run: bash scripts/check-arch-contract.test.sh
      - name: SOTA-DoD gate regression tests (commits d2c8d5a..df70fce)
        run: bash scripts/check-sota-dod.test.sh
      - name: arch-contract (T1.5)
        run: bash scripts/check-arch-contract.sh
      - name: size (T4.6)
        run: bash scripts/check-sizes.sh
      # Structural complement to size + complexity allowlists:
      # every entry must reference an existing file/crate. Stale
      # entries silently disable the gate.
      - name: allowlist paths (structural)
        run: bash scripts/check-allowlist-paths.sh
      - name: unwrap/expect (T2.5)
        run: bash scripts/check-unwrap.sh
      - name: panic/todo/unimplemented (T2.6)
        run: bash scripts/check-panic.sh
      - name: unsafe SAFETY comments (T2.9)
        run: bash scripts/check-unsafe.sh
      - name: secret grep fallback (T6.2)
        run: bash scripts/check-secrets.sh
      - name: changelog touched (T6.5)
        run: bash scripts/check-changelog.sh --base=origin/${{ github.base_ref || 'main' }}
      # SOTA Global DoD #8 (commit ef452fb / d2c8d5a) — every ADR
      # D1-D16 has at least one commit referencing one of its tied
      # task IDs.
      - name: ADR coverage (SOTA Global DoD #8)
        run: bash scripts/check-adr-coverage.sh
      # SOTA Global DoD #7 — every phase 0..16 has at least one
      # mention in CHANGELOG.md [Unreleased], either by literal
      # "Phase N" or by any of its tied task IDs (T0.1, T2.1, ...).
      - name: CHANGELOG phase coverage (SOTA Global DoD #7)
        run: bash scripts/check-changelog-phase-coverage.sh
      # SOTA Global DoD #1 (CODE half) — every phase 0..16 has its
      # promised artifact (type, field, module, tool) present at the
      # canonical site. The BEHAVIOUR half (E2E manuals + bench
      # runs) is gated by audit.yml::eval (DoD #10/#11).
      - name: Phase artifact completeness (SOTA Global DoD #1)
        run: bash scripts/check-phase-artifacts.sh
      # Bench infrastructure pre-flight (DoD #10/#11 scaffold). The
      # empirical halves require paid LLM API and run in eval.yml,
      # but the scaffold (eval.yml YAML, smoke.py imports, scenario
      # TOML, analysis/report_builder) is gate-able without keys.
      # --no-build skips the release build (the bench-full job rebuilds).
      - name: Bench infrastructure pre-flight (DoD #10/#11 scaffold)
        run: bash scripts/check-bench-preflight.sh --no-build

  # ── Rust build + tests ──────────────────────────────────────────────────
  rust:
    name: Rust build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --workspace --exclude theo-code-desktop
      - name: test
        run: cargo test --workspace --exclude theo-code-desktop --lib --tests
      - name: build OTel feature (T0.3 / find_p5_002)
        run: cargo build -p theo-agent-runtime --features otel
      - name: test OTel feature (T0.3 / find_p5_002)
        run: cargo test -p theo-agent-runtime --features otel --test otlp_network_smoke
      # SOTA Global DoD #6 partial (commit b49371a) — clippy::too_many_lines
      # per-crate ceiling. The script invokes its own cargo clippy run, so
      # placement in the `rust` job (which has cargo + cache) is correct.
      - name: complexity gate (SOTA Global DoD #6 partial)
        run: bash scripts/check-complexity.sh

  # ── UI build + tests ────────────────────────────────────────────────────
  ui:
    name: UI build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/theo-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/theo-ui/package-lock.json
      - run: npm ci
      - name: npm audit (high)
        run: npm audit --audit-level=high
      - name: madge (T0.2 — circular imports)
        run: npm run audit:circ
      - name: vitest
        run: npm test -- --run
      - name: vite build
        run: npm run build

  # ── SCA gates ───────────────────────────────────────────────────────────
  sca:
    name: SCA (cargo-deny, cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-deny
        run: cargo install --locked cargo-deny
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo deny (T3.2)
        run: cargo deny check
      - name: cargo audit (T3.1)
        run: cargo audit --deny warnings
      # T4.9 / find_p5_007 — SBOM generation for supply-chain
      # observability. CycloneDX is the standard format consumed by
      # Dependency-Track / OWASP tooling. The artifact is uploaded so
      # downstream releases can publish it alongside the binaries.
      - name: install cargo-cyclonedx (T4.9)
        run: cargo install --locked cargo-cyclonedx
      - name: generate SBOM (T4.9 / find_p5_007)
        run: cargo cyclonedx --format json --output-pattern bom
      - name: upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: '**/bom.json'
          if-no-files-found: error
          retention-days: 30

  # ── SAST gates (semgrep + gitleaks) ─────────────────────────────────────
  sast:
    name: SAST (semgrep + gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs history to scan past commits (T6.2 DoD).
          fetch-depth: 0
      - name: semgrep (T6.1)
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep/theo.yaml
      - name: gitleaks (T6.2)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Coverage gate (T0.3): theo-agent-runtime line-rate per module. ──
  # Re-runs cargo tarpaulin and fails the build if any tracked module
  # drops by more than MAX_DROP_PP percentage points vs the canonical
  # baseline TSV in .coverage/. The baseline is updated by committing
  # a new baseline-<sha>.tsv after a deliberate change.
  coverage:
    name: Coverage gate (T0.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: run coverage check
        run: bash scripts/check-coverage.sh
      # SOTA Global DoD #6 partial (commit ef452fb) — fast validator
      # of the cobertura.xml that `check-coverage.sh` just produced.
      # Cheap belt-and-suspenders: if the artifact wasn't produced
      # OR fell below the line-rate floor, surface it explicitly.
      - name: coverage status (SOTA Global DoD #6 partial)
        run: bash scripts/check-coverage-status.sh

  # ── Module-size gate (T8.5): cap production-only LOC per file. ──
  # Counts non-test lines (stops at first `#[cfg(test)]`) in every .rs
  # file under `crates/theo-agent-runtime/src/`. Fails the build when
  # any file exceeds `MAX_LOC` (default 1000 — regression-prevention
  # cap; long-term target is 500 but several mature post-split modules
  # still sit above and need their own dedicated split iteration).
  module_size:
    name: Module-size gate (T8.5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run module-size check
        run: bash scripts/check-module-size.sh
