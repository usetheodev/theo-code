# Recognized Rust idioms — machine-readable companion to ADR-021.
#
# Format:
#   [[<gate>_pattern]]
#   name = "<short-id>"
#   regex = '<rust-style-regex>'  # interpreted by check-<gate>.sh
#   scope = "<glob>"              # bash-glob; multiple via [[...]] entries
#   invariant = "<one-line>"
#   adr = "021-recognized-rust-idioms.md#<anchor>"
#   alternative_rejected = "<one-line>"
#
# Entries here are NOT exceptions — they are the canonical idioms the
# project uses. The gate scripts treat them as ALLOWED first, then
# fall back to the legacy allowlist for any remaining sites.
#
# Adding a new pattern requires (a) a new ADR-021 section and (b) an
# entry below. Removing a pattern requires the symmetric deletion.

version = 1
spec = "021-recognized-rust-idioms.md"

# ---------------------------------------------------------------------------
# unwrap_pattern entries (consumed by scripts/check-unwrap.sh)
# ---------------------------------------------------------------------------

[[unwrap_pattern]]
name = "mutex_poison_lock"
regex = '\.(lock|read|write)\(\)\.expect\(.*(poisoned|lock).*\)'
scope = "crates/**/*.rs"
invariant = "Mutex/RwLock poisoning is unrecoverable; .expect() documents the contract"
adr = "021-recognized-rust-idioms.md#1-mutex_poison_lock"
alternative_rejected = "wrap in Result<T, MutexPoisonError> — every consumer would re-panic identically"

[[unwrap_pattern]]
name = "mutex_poison_lock_apps"
regex = '\.(lock|read|write)\(\)\.expect\(.*(poisoned|lock).*\)'
scope = "apps/**/*.rs"
invariant = "Same Mutex/RwLock poison contract as crates/"
adr = "021-recognized-rust-idioms.md#1-mutex_poison_lock"
alternative_rejected = "see crates entry"

[[unwrap_pattern]]
name = "system_clock_unix_epoch_domain"
regex = '\.expect\("system clock before UNIX epoch"\)'
scope = "crates/theo-domain/**/*.rs"
invariant = "SystemTime::duration_since(UNIX_EPOCH) only fails if clock is set before 1970-01-01 — fatal misconfiguration"
adr = "021-recognized-rust-idioms.md#2-system_clock_unix_epoch"
alternative_rejected = "Result<u64, ClockError> — caller can only re-panic"

[[unwrap_pattern]]
name = "system_clock_unix_epoch_tooling"
regex = '\.expect\("system clock before UNIX epoch"\)'
scope = "crates/theo-tooling/**/*.rs"
invariant = "Same UNIX-clock invariant as theo-domain"
adr = "021-recognized-rust-idioms.md#2-system_clock_unix_epoch"
alternative_rejected = "see domain entry"

[[unwrap_pattern]]
name = "embedded_tool_schema_valid"
regex = '\.expect\(".*tool schema is valid"\)'
scope = "crates/theo-tooling/**/*.rs"
invariant = "Tool schemas are embedded const data; build_registry contract test validates each"
adr = "021-recognized-rust-idioms.md#3-embedded_tool_schema_valid"
alternative_rejected = "unwrap_or + log — masks programming bugs in embedded data"

[[unwrap_pattern]]
name = "process_entrypoint_runtime_init"
regex = 'tokio::runtime::Runtime::new\(\)\.expect\('
scope = "apps/theo-cli/**/*.rs"
invariant = "Runtime spawn failure at process entrypoint is fatal by design"
adr = "021-recognized-rust-idioms.md#4-process_entrypoint_runtime_init"
alternative_rejected = "process::exit(1) with manual print — expect() IS that pattern with stack trace"

[[unwrap_pattern]]
name = "observability_writer_spawn"
regex = '\.expect\(.*(metrics|spawn).*\)'
scope = "crates/theo-agent-runtime/src/observability/**/*.rs"
invariant = "Failure to spawn observability writer / metrics mutex is fatal — blind agent is worse than fast crash"
adr = "021-recognized-rust-idioms.md#5-observability_writer_spawn"
alternative_rejected = "silently degrade to no-op — masks observability failures in CI"

[[unwrap_pattern]]
name = "syntect_default_theme"
regex = 'themes\.values\(\)\.next\(\)\.expect\("at least one theme"\)'
scope = "apps/theo-cli/src/render/**/*.rs"
invariant = "Syntect bundles at least one theme at compile time — invariant proven by sibling test"
adr = "021-recognized-rust-idioms.md#3-embedded_tool_schema_valid"
alternative_rejected = "fallback theme constant — duplicates Syntect data"

# ---------------------------------------------------------------------------
# unsafe_pattern entries (consumed by scripts/check-unsafe.sh)
# ---------------------------------------------------------------------------

[[unsafe_pattern]]
name = "rust_2024_test_env_var"
regex = 'unsafe\s*\{\s*std::env::(set_var|remove_var)\('
scope = "crates/**/*.rs"
invariant = "Rust 2024 made env::set_var/remove_var unsafe; tests serialise via per-module Mutex<()>"
adr = "021-recognized-rust-idioms.md#6-rust_2024_test_env_var"
alternative_rejected = "thread-safe shim crate — adds dep for test-only need"

[[unsafe_pattern]]
name = "rust_2024_test_env_var_apps"
regex = 'unsafe\s*\{\s*std::env::(set_var|remove_var)\('
scope = "apps/**/*.rs"
invariant = "Same Rust 2024 env_var contract as crates/"
adr = "021-recognized-rust-idioms.md#6-rust_2024_test_env_var"
alternative_rejected = "see crates entry"

# ---------------------------------------------------------------------------
# panic_pattern entries (consumed by scripts/check-panic.sh)
# ---------------------------------------------------------------------------

[[panic_pattern]]
name = "builtin_tool_schema_panic"
regex = 'panic!\(".*invalid schema.*"\)'
scope = "crates/theo-tooling/**/*.rs"
invariant = "Startup panic if a built-in tool ships an invalid schema; no recoverable path"
adr = "021-recognized-rust-idioms.md#7-builtin_tool_schema_panic"
alternative_rejected = "compile-time validation via proc-macro — scope creep"

[[panic_pattern]]
name = "observability_normalizer_compile_panic"
regex = 'panic!\(".*regex.*compile.*"\)'
scope = "crates/theo-agent-runtime/src/observability/normalizer.rs"
invariant = "Patterns are compile-time literals validated by sibling tests; this branch is unreachable in practice"
adr = "021-recognized-rust-idioms.md#8-observability_normalizer_compile_panic"
alternative_rejected = "Result<&Regex, regex::Error> — pollutes callers without safety gain"

# ---------------------------------------------------------------------------
# secret_pattern entries (consumed by scripts/check-secrets.sh)
# ---------------------------------------------------------------------------

[[secret_pattern]]
name = "test_fixture_dummy_keys"
scope_path = "tests/"
invariant = "Strings inside test directories are dummy fixtures; they cannot grant access"
adr = "021-recognized-rust-idioms.md#9-test_fixture_dummy_keys"
alternative_rejected = "PRNG-generated dummies — hurts test reproducibility"

[[secret_pattern]]
name = "test_fixture_dummy_keys_mock_files"
scope_path = "mock_"
invariant = "Files named mock_*.rs are test mocks; same dummy-fixture contract"
adr = "021-recognized-rust-idioms.md#9-test_fixture_dummy_keys"
alternative_rejected = "see test_fixture_dummy_keys"

[[secret_pattern]]
name = "test_fixture_dummy_keys_test_helpers"
scope_path = "test_helpers.rs"
invariant = "Files named test_helpers.rs are test infrastructure; same dummy-fixture contract"
adr = "021-recognized-rust-idioms.md#9-test_fixture_dummy_keys"
alternative_rejected = "see test_fixture_dummy_keys"

[[secret_pattern]]
name = "test_fixture_dummy_keys_memory_fixtures"
scope_path = "theo-test-memory-fixtures"
invariant = "Whole crate is the test-fixture container; same dummy-fixture contract"
adr = "021-recognized-rust-idioms.md#9-test_fixture_dummy_keys"
alternative_rejected = "see test_fixture_dummy_keys"
