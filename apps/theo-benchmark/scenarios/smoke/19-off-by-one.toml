id = "19-off-by-one"
category = "fix-bug"
description = "Fix off-by-one error in pagination logic"
prompt = "The paginate function in src/pagination.py has an off-by-one error. When there are exactly 10 items and page_size=10, it returns total_pages=2 instead of 1. Similarly, 11 items with page_size=10 should return 2 pages, not 3. Fix the calculation."
mode = "agent"
timeout_secs = 120

success_check = '''
python3 -c "
import sys; sys.path.insert(0, '.')
from src.pagination import paginate

# Exactly one page
result = paginate(list(range(10)), page=1, page_size=10)
assert result['total_pages'] == 1, f'10 items: expected 1 page, got {result[\"total_pages\"]}'
assert len(result['items']) == 10

# Just over one page
result = paginate(list(range(11)), page=1, page_size=10)
assert result['total_pages'] == 2, f'11 items: expected 2 pages, got {result[\"total_pages\"]}'

# Empty list
result = paginate([], page=1, page_size=10)
assert result['total_pages'] == 0, f'0 items: expected 0 pages, got {result[\"total_pages\"]}'

# Exact multiple
result = paginate(list(range(20)), page=2, page_size=10)
assert result['total_pages'] == 2
assert result['items'] == list(range(10, 20))

print('OK')
"
'''

[[setup_files]]
path = "src/__init__.py"
content = ""

[[setup_files]]
path = "src/pagination.py"
content = """
def paginate(items: list, page: int = 1, page_size: int = 10) -> dict:
    \"\"\"Paginate a list of items.

    Returns dict with 'items' (current page), 'page', 'total_pages'.
    \"\"\"
    total = len(items)
    # BUG: off-by-one — adds 1 even when total is exact multiple of page_size
    total_pages = (total // page_size) + 1

    start = (page - 1) * page_size
    end = start + page_size

    return {
        'items': items[start:end],
        'page': page,
        'page_size': page_size,
        'total': total,
        'total_pages': total_pages,
    }
"""
